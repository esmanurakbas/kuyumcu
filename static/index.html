<!doctype html>
<html lang="tr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AKBAŞ</title>
    <link rel="icon" type="image/png" href="/static/logo.png" />
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <aside class="sidebar">
      <div class="brand">
        <img src="/static/logo.png" alt="Logo" class="brand-logo" />
        <div>
          <strong>AKBAŞ</strong>
        </div>
      </div>
      <nav>
        <button class="nav active" data-view="dashboard">Dashboard</button>
        <button class="nav" data-view="alis">Alış</button>
        <button class="nav" data-view="satis">Satış</button>
        <button class="nav" data-view="hurda_alis">Hurda Alış</button>
        <button class="nav" data-view="hurda_satis">Hurda Satış</button>
        <button class="nav" data-view="stok">Stok</button>
        <button class="nav" data-view="cari">Cari</button>
      </nav>
      <button id="logoutBtn" class="logout" type="button">Çıkış</button>
    </aside>

    <main class="app">
      <header class="topbar">
        <div>
          <h1 id="pageTitle">Dashboard</h1>
          <p id="pageSubtitle">Güncel genel durum</p>
        </div>
        <div class="topbar-controls">
          <button id="exportBtn" class="top-export-button" type="button" title="Yedek almak için tüm verileri JSON olarak indirir.">TÜM VERİLERİ DIŞA AKTAR</button>
          <input id="search" type="search" placeholder="Ara..." autocomplete="off" />
        </div>
      </header>

      <section id="content"></section>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
